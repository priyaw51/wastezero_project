<body>

<div class="sidebar">
    <div>
        <h2>WasteZero</h2>
        <ul>
            <li>Dashboard</li>
            <li>Users</li>
            <li>Agents</li>
            <li>Reports</li>
        </ul>
    </div>
    <button onclick="logout()">Logout</button>
</div>

<div class="main">

    <div class="header">
        <h1>Admin Dashboard</h1>
        <p>Monitor and manage WasteZero platform</p>
    </div>

    <div class="cards">
        <div class="card blue">
            <h3>Total Users</h3>
            <p>10</p>
        </div>

        <div class="card green">
            <h3>Total Agents</h3>
            <p>5</p>
        </div>

        <div class="card purple">
            <h3>Total Pickups</h3>
            <p>15</p>
        </div>

        <div class="card orange">
            <h3>Waste Collected</h3>
            <p>120 Kg</p>
        </div>
    </div>

    <div class="small-boxes">
        <div class="small-card">
            <h4>Completed Pickups</h4>
            <p>8</p>
        </div>

        <div class="small-card">
            <h4>Pending Pickups</h4>
            <p>4</p>
        </div>

        <div class="small-card">
            <h4>Active Pickups</h4>
            <p>3</p>
        </div>
    </div>

</div>
